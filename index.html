<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow">
    <meta name="referrer" content="no-referrer">
    <meta name="theme-color" content="#faf7f2">
    <title>复制刺绣文字</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #faf7f2;
            color: #1a1a1a;
            line-height: 1.5;
            min-height: 100vh;
            min-height: 100dvh;
            padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(40px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            max-width: 520px;
            margin: 0 auto;
        }

        .page-header {
            margin: 8px 0 28px 0;
            text-align: left;
        }

        .page-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.01em;
            margin: 0 0 6px 0;
            color: #1a1a1a;
        }

        .page-sub {
            font-size: 13px;
            color: #6b6459;
            margin: 0;
            letter-spacing: 0.02em;
        }

        .card {
            background: #ffffff;
            border: 1px solid #ece6db;
            border-radius: 14px;
            padding: 20px 20px 22px 20px;
            margin-bottom: 18px;
            box-shadow: 0 1px 2px rgba(30, 20, 10, 0.03);
        }

        .card-index {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #8a7e6c;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .card-meta {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
            color: #8a7e6c;
            margin: 0 0 10px 0;
            letter-spacing: 0.03em;
        }

        .card-placement {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin: 0 0 14px 0;
            letter-spacing: 0.01em;
            word-break: break-word;
        }

        .card-placement .placement-fallback {
            color: #8a7e6c;
            font-weight: 500;
        }

        .text-block {
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 30px;
            font-weight: 500;
            line-height: 1.35;
            color: #1a1a1a;
            background: #f5f0e6;
            border: 1px solid #e6dfd1;
            border-radius: 10px;
            padding: 18px 16px;
            margin: 0 0 16px 0;
            word-break: break-all;
            white-space: pre-wrap;
            letter-spacing: 0.01em;
            -webkit-user-select: all;
            user-select: all;
            transition: background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .text-block.highlight {
            background: #fdf3e3;
            border-color: #b8693a;
            box-shadow: 0 0 0 3px rgba(184, 105, 58, 0.18);
            animation: pulse 1.6s ease-in-out 2;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(184, 105, 58, 0.18); }
            50%      { box-shadow: 0 0 0 6px rgba(184, 105, 58, 0.28); }
        }

        .copy-btn {
            appearance: none;
            -webkit-appearance: none;
            display: block;
            width: 100%;
            min-height: 52px;
            padding: 14px 20px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.02em;
            color: #ffffff;
            background: #b8693a;
            border: 1px solid #a35a2f;
            border-radius: 999px;
            cursor: pointer;
            transition: background-color 0.15s ease, transform 0.1s ease, color 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .copy-btn:hover {
            background: #a35a2f;
        }

        .copy-btn:active {
            background: #8e4d27;
            transform: scale(0.985);
        }

        .copy-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(184, 105, 58, 0.3);
        }

        .copy-btn.copied {
            background: #2f6d4a;
            border-color: #285e3f;
            color: #ffffff;
        }

        .copy-btn.manual {
            background: #ffffff;
            color: #1a1a1a;
            border: 1px solid #1a1a1a;
            font-weight: 600;
        }

        .state-box {
            text-align: center;
            padding: 48px 20px;
            margin-top: 24px;
            background: #ffffff;
            border: 1px dashed #d8cfbe;
            border-radius: 14px;
        }

        .state-box-title {
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1a1a1a;
        }

        .state-box-sub {
            font-size: 13px;
            color: #6b6459;
            margin: 0;
            letter-spacing: 0.01em;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 11px;
            color: #a79c88;
            letter-spacing: 0.04em;
        }

        /* Prevent iOS zoom-on-tap for buttons by keeping font-size >= 16px.
           Also keep .text-block tap-target comfortable. */
        @media (max-width: 360px) {
            .text-block { font-size: 26px; padding: 16px 14px; }
            .page-title { font-size: 20px; }
        }
    </style>
</head>
<body>
    <main id="app" aria-live="polite">
        <!-- Populated by JS -->
    </main>
    <script>
        (function () {
            'use strict';

            var app = document.getElementById('app');
            var params = new URLSearchParams(window.location.search);
            var encoded = params.get('t');

            if (!encoded) {
                renderEmpty(app);
                return;
            }

            var payload;
            try {
                payload = decodePayload(encoded);
                if (!Array.isArray(payload) || payload.length === 0) {
                    throw new Error('empty-or-not-array');
                }
            } catch (e) {
                renderError(app);
                return;
            }

            renderCards(app, payload);

            function decodePayload(raw) {
                // base64url -> base64
                var b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
                // Restore padding
                var pad = b64.length % 4;
                if (pad === 2) b64 += '==';
                else if (pad === 3) b64 += '=';
                else if (pad !== 0) throw new Error('bad-base64-length');

                var binary = atob(b64);
                // UTF-8 decode via the legacy-safe escape/decodeURIComponent pattern.
                // This is the most compatible path across older WebViews (WeChat Android,
                // older Chrome) where TextDecoder may be missing or quirky.
                var json;
                try {
                    json = decodeURIComponent(escape(binary));
                } catch (err) {
                    // Fallback: TextDecoder if available (newer browsers)
                    if (typeof TextDecoder !== 'undefined') {
                        var bytes = new Uint8Array(binary.length);
                        for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        json = new TextDecoder('utf-8').decode(bytes);
                    } else {
                        throw err;
                    }
                }
                return JSON.parse(json);
            }

            function renderHeader(titleText, subText) {
                var header = document.createElement('header');
                header.className = 'page-header';
                var h1 = document.createElement('h1');
                h1.className = 'page-title';
                h1.textContent = titleText;
                header.appendChild(h1);
                if (subText) {
                    var p = document.createElement('p');
                    p.className = 'page-sub';
                    p.textContent = subText;
                    header.appendChild(p);
                }
                return header;
            }

            function renderEmpty(root) {
                root.innerHTML = '';
                root.appendChild(renderHeader('复制刺绣文字', '扫码后将显示刺绣文字与复制按钮'));
                var box = document.createElement('div');
                box.className = 'state-box';
                var title = document.createElement('p');
                title.className = 'state-box-title';
                title.textContent = '未找到刺绣文字数据';
                var sub = document.createElement('p');
                sub.className = 'state-box-sub';
                sub.textContent = '请检查二维码 · No monogram data';
                box.appendChild(title);
                box.appendChild(sub);
                root.appendChild(box);
            }

            function renderError(root) {
                root.innerHTML = '';
                root.appendChild(renderHeader('复制刺绣文字', '扫码后将显示刺绣文字与复制按钮'));
                var box = document.createElement('div');
                box.className = 'state-box';
                var title = document.createElement('p');
                title.className = 'state-box-title';
                title.textContent = '二维码数据无法读取';
                var sub = document.createElement('p');
                sub.className = 'state-box-sub';
                sub.textContent = '请重新扫描订单单据上的二维码 · Unable to read QR data';
                box.appendChild(title);
                box.appendChild(sub);
                root.appendChild(box);
            }

            function renderCards(root, items) {
                root.innerHTML = '';
                var subText = items.length > 1
                    ? '共 ' + items.length + ' 条 · 点击按钮复制 · Tap to copy'
                    : '点击按钮复制文字 · Tap to copy';
                root.appendChild(renderHeader('复制刺绣文字', subText));

                items.forEach(function (item, idx) {
                    var text = (item && typeof item.text === 'string') ? item.text : '';
                    if (!text) return; // skip empty entries defensively
                    var placement = (item && typeof item.placement === 'string') ? item.placement.trim() : '';
                    var productId = (item && typeof item.product_id === 'string') ? item.product_id.trim() : '';
                    var fabricCode = (item && typeof item.fabric_code === 'string') ? item.fabric_code.trim() : '';

                    var card = document.createElement('section');
                    card.className = 'card';

                    if (items.length > 1) {
                        var indexTag = document.createElement('div');
                        indexTag.className = 'card-index';
                        indexTag.textContent = '第 ' + (idx + 1) + ' / ' + items.length + ' 条';
                        card.appendChild(indexTag);
                    }

                    if (productId || fabricCode) {
                        var metaParts = [];
                        if (productId) metaParts.push(productId);
                        if (fabricCode) metaParts.push(fabricCode);
                        var metaEl = document.createElement('div');
                        metaEl.className = 'card-meta';
                        metaEl.textContent = metaParts.join(' · ');
                        card.appendChild(metaEl);
                    }

                    var placementEl = document.createElement('h2');
                    placementEl.className = 'card-placement';
                    if (placement) {
                        placementEl.textContent = placement;
                    } else {
                        var span = document.createElement('span');
                        span.className = 'placement-fallback';
                        span.textContent = '刺绣位置未标注';
                        placementEl.appendChild(span);
                    }
                    card.appendChild(placementEl);

                    var textBlock = document.createElement('div');
                    textBlock.className = 'text-block';
                    textBlock.setAttribute('role', 'textbox');
                    textBlock.setAttribute('aria-readonly', 'true');
                    textBlock.setAttribute('tabindex', '0');
                    textBlock.textContent = text;
                    card.appendChild(textBlock);

                    var btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.type = 'button';
                    btn.textContent = '复制 / Copy';
                    btn.setAttribute('data-default-label', '复制 / Copy');
                    btn.addEventListener('click', function () {
                        copyToClipboard(text, btn, textBlock);
                    });
                    card.appendChild(btn);

                    root.appendChild(card);
                });
            }

            function markCopied(btn) {
                btn.classList.remove('manual');
                btn.classList.add('copied');
                btn.textContent = '\u2713 已复制 / Copied';
                setTimeout(function () {
                    btn.classList.remove('copied');
                    btn.textContent = btn.getAttribute('data-default-label') || '复制 / Copy';
                }, 2000);
            }

            function markManualSelect(btn, textBlock) {
                btn.classList.remove('copied');
                btn.classList.add('manual');
                btn.textContent = '选择文本并长按复制';
                textBlock.classList.add('highlight');
                // Range-select the text block so the user sees the selection immediately.
                try {
                    var sel = window.getSelection();
                    if (sel) {
                        sel.removeAllRanges();
                        var range = document.createRange();
                        range.selectNodeContents(textBlock);
                        sel.addRange(range);
                    }
                } catch (e) { /* ignore; highlight class still draws the eye */ }
                setTimeout(function () {
                    textBlock.classList.remove('highlight');
                }, 3400);
            }

            async function copyToClipboard(text, btn, textBlock) {
                // Layer 1: modern Clipboard API
                if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                    try {
                        await navigator.clipboard.writeText(text);
                        markCopied(btn);
                        return;
                    } catch (e) { /* fall through */ }
                }

                // Layer 2: legacy execCommand('copy') via hidden textarea
                try {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.setAttribute('readonly', '');
                    ta.style.position = 'fixed';
                    ta.style.top = '0';
                    ta.style.left = '-9999px';
                    ta.style.opacity = '0';
                    ta.style.pointerEvents = 'none';
                    document.body.appendChild(ta);
                    // iOS Safari needs explicit range selection on contenteditable/textarea
                    ta.focus();
                    ta.select();
                    if (ta.setSelectionRange) {
                        try { ta.setSelectionRange(0, text.length); } catch (e2) { /* ignore */ }
                    }
                    var ok = false;
                    try { ok = document.execCommand('copy'); } catch (e3) { ok = false; }
                    document.body.removeChild(ta);
                    if (ok) {
                        markCopied(btn);
                        return;
                    }
                } catch (e) { /* fall through */ }

                // Layer 3: manual-select fallback
                markManualSelect(btn, textBlock);
            }
        })();
    </script>
</body>
</html>
